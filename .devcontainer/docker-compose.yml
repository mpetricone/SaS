version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - bundle_cache:/usr/local/bundle
      - node_modules:/workspace/node_modules
    command: sleep infinity

    environment:
      # Rails
      - RAILS_ENV=development
      # MySQL — running in the db container
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
      # Selenium remote WebDriver (used by Capybara in test env)
      - SELENIUM_REMOTE_URL=http://selenium:4444
      # Capybara must bind to 0.0.0.0 so the selenium container can reach it
      - CAPYBARA_SERVER_HOST=0.0.0.0
      - RAILS_DEV_PORT=3000
      - RAILS_DEV_IP=0.0.0.0
    depends_on:
      db:
        condition: service_healthy
      selenium:
        condition: service_healthy
    networks:
      devnet:
        aliases:
          - app
    ports:
      - "4567:4567"
      - "3000:3000"

  db:
    image: docker.io/library/mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_USER: root
      MARIADB_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - devnet

  selenium:
    image: docker.io/selenium/standalone-chromium:latest
    restart: unless-stopped
    tmpfs:
      - /dev/shm:size=2147483648
    environment:
      - SE_NODE_MAX_SESSIONS=4
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_NO_PASSWORD=1
    ports:
      - "4444:4444" # WebDriver endpoint / Grid UI
      - "7900:7900" # noVNC live browser view → http://localhost:7900
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sSf http://localhost:4444/status | grep -q ''"ready": true''',
        ]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      devnet:
        aliases:
          - selenium

volumes:
  mysql_data:
  bundle_cache:
  node_modules:

networks:
  devnet:
