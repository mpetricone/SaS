# config/database.yml
#
# Devcontainer-aware database config for SaS.
# Uses environment variables so it works both inside the container
# (where MYSQL_HOST=db) and on a local machine (falls back to 127.0.0.1).
#
# The `trilogy` adapter is used (Rails 8.1 default for MySQL).
# The `mysql2` gem is also in the Gemfile for compatibility.

default: &default
  adapter: trilogy
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("MYSQL_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("MYSQL_PORT", 3306) %>
  username: <%= ENV.fetch("MYSQL_USER", "rails") %>
  password: <%= ENV.fetch("MYSQL_PASSWORD", "rails") %>

development:
  <<: *default
  database: sas_development

test:
  <<: *default
  database: sas_test

production:
  <<: *default
  database: sas_production
  username: <%= ENV["MYSQL_USER"] %>
  password: <%= ENV["MYSQL_PASSWORD"] %>
